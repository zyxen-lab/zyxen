<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyxen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080c12;
  --surface:  #0e1420;
  --border:   rgba(255,255,255,0.07);
  --accent:   #7dd3fc;
  --accent2:  #c084fc;
  --text:     #f1f5f9;
  --muted:    #64748b;
  --glow:     rgba(125,211,252,0.15);
}

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  padding: 2rem 1rem;
}

/* subtle grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(125,211,252,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(125,211,252,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2.5rem 2rem 2rem;
  text-align: center;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(125,211,252,0.1);
}

/* glow ring behind avatar */
.avatar-wrap {
  position: relative;
  width: 110px;
  height: 110px;
  margin: 0 auto 1.4rem;
}

.avatar-wrap::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: conic-gradient(var(--accent), var(--accent2), var(--accent));
  opacity: 0.6;
  animation: spin 6s linear infinite;
  z-index: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.avatar-wrap::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  background: var(--surface);
  z-index: 1;
}

.avatar {
  position: relative;
  z-index: 2;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
}

/* name */
.name {
  font-size: 1.6rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 0.3rem;
  background: linear-gradient(135deg, var(--text) 40%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.role {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--accent2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 1.8rem;
}

/* divider */
.divider {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 0 auto 1.8rem;
}

/* info pills */
.info-list {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin-bottom: 1.8rem;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.6rem 0.9rem;
  font-size: 0.82rem;
  color: #94a3b8;
  transition: border-color 0.2s, color 0.2s;
}

.info-item:hover {
  border-color: rgba(125,211,252,0.25);
  color: var(--text);
}

.info-icon {
  font-size: 1rem;
  flex-shrink: 0;
}

/* buttons */
.btn-row {
  display: flex;
  gap: 0.6rem;
  margin-bottom: 1.6rem;
}

.btn {
  flex: 1;
  padding: 0.7rem 0.5rem;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
}

.btn-primary {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: #fff;
  box-shadow: 0 4px 15px rgba(99,102,241,0.3);
}

.btn-primary:hover {
  box-shadow: 0 6px 22px rgba(99,102,241,0.5);
  transform: translateY(-1px);
}

.btn-ghost {
  background: rgba(255,255,255,0.05);
  color: #94a3b8;
  border: 1px solid var(--border);
}

.btn-ghost:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text);
  border-color: rgba(125,211,252,0.2);
}

/* social icons row */
.socials {
  display: flex;
  justify-content: center;
  gap: 0.7rem;
}

.social-btn {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-size: 1rem;
  transition: all 0.2s;
  color: var(--muted);
}

.social-btn:hover {
  background: rgba(125,211,252,0.1);
  border-color: rgba(125,211,252,0.3);
  color: var(--accent);
  transform: translateY(-2px);
}

/* status badge */
.status {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: #4ade80;
  background: rgba(74,222,128,0.08);
  border: 1px solid rgba(74,222,128,0.2);
  border-radius: 99px;
  padding: 0.25rem 0.7rem;
  margin-bottom: 1.4rem;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

@media (prefers-reduced-motion: reduce) {
  .avatar-wrap::before, .status-dot { animation: none; }
  .card:hover { transform: none; }
}
</style>
</head>
<body>
<div class="card">

  <div class="avatar-wrap">
    <!-- 🔧 Bild-URL hier ändern: -->
    <img
      class="avatar"
      src="https://c10.patreonusercontent.com/4/patreon-media/p/post/147692957/7064e0d0135e415c87ad2148a4ad59d1/eyJ3IjoxMDgwfQ%3D%3D/1.png?token-hash=OeLDGESBe3N2oHLGfZ4-8wqd-1isxuDGWe3L6Jhs3R0%3D&token-time=1782259200"
      alt="Profilbild von Zyxen"
    >
  </div>

  <div class="status">
    <div class="status-dot"></div>
    available for you :3
  </div>

  <div class="name">Zyxen</div>
  <div class="role">Hobby Developer ᗜ⩊ᗜ</div>
  <div class="divider"></div>

  <div class="info-list">
    <div class="info-item">
      <span class="info-icon">📧</span>
      zyxen@atomicmail.io
    </div>
    <div class="info-item">
      <span class="info-icon">📍</span>
      Germany
    </div>
  </div>

  <div class="btn-row">
    <a href="mailto:zyxen@atomicmail.io" class="btn btn-primary">
      ✉️ Email me
    </a>
    <a href="#" class="btn btn-ghost">
      📋 Copy mail
    </a>
  </div>

  <div class="socials">
    <!-- 🔧 Links hier anpassen: -->
    <a href="https://github.com/zyxen-lab" class="social-btn" title="GitHub">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
    </a>
    <a href="https://github.com/MattisBothe" class="social-btn" title="My BFF">
      🌐
    </a>
  </div>

</div>

<script>
// Copy-Mail Button
document.querySelector('.btn-ghost').addEventListener('click', function(e) {
  e.preventDefault();
  navigator.clipboard.writeText('zyxen@atomicmail.io').then(() => {
    const btn = this;
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Kopiert!';
    btn.style.color = '#4ade80';
    btn.style.borderColor = 'rgba(74,222,128,0.3)';
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  });
});
</script>
</body>
</html>
